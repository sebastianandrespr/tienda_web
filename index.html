<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Tienda Virtual - Inicio</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/theme.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar and Layout based on stitch/inventario_productos/code.html -->
        <aside
            class="w-64 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark flex flex-col">
            <div class="p-6 flex items-center gap-3">
                <div class="bg-primary rounded-xl p-2 flex items-center justify-center text-white">
                    <span class="material-symbols-outlined">shopping_bag</span>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight">MiTienda</h1>
                    <p class="text-xs text-slate-500 dark:text-slate-400">Online Store</p>
                </div>
            </div>
            <nav class="flex-1 px-4 space-y-1">
                <a class="flex items-center gap-3 px-3 py-2 bg-primary/10 text-primary rounded-xl transition-colors"
                    href="index.html">
                    <span class="material-symbols-outlined">home</span>
                    <span class="text-sm font-semibold">Toda la tienda</span>
                </a>

                <div class="pt-4 pb-2">
                    <p class="px-3 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">
                        Categorías</p>
                </div>
                <div id="categories-container" class="space-y-1">
                    <!-- Categorías dinámicas -->
                </div>

                <div class="pt-4 border-t border-slate-200 dark:border-slate-800 mt-4">
                    <a class="flex items-center gap-3 px-3 py-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors"
                        href="carrito.html">
                        <span class="material-symbols-outlined">shopping_cart</span>
                        <span class="text-sm font-medium">Carrito</span>
                    </a>
                    <a id="account-link"
                        class="flex items-center gap-3 px-3 py-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors"
                        href="login.html">
                        <span class="material-symbols-outlined">person</span>
                        <span id="account-text" class="text-sm font-medium">Mi Cuenta</span>
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <header
                class="h-16 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark px-8 flex items-center justify-between">
                <div class="flex-1 max-w-xl">
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                        <input
                            class="w-full pl-10 pr-4 py-2 bg-slate-100 dark:bg-slate-800 border-none rounded-xl text-sm focus:ring-2 focus:ring-primary/50 transition-all placeholder:text-slate-500"
                            placeholder="Buscar productos..." type="text" id="search-input" />
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button
                        class="p-2 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors relative"
                        onclick="location.href='carrito.html'">
                        <span class="material-symbols-outlined">shopping_cart</span>
                        <span
                            class="absolute top-2 right-2 size-2 bg-primary rounded-full border-2 border-white dark:border-background-dark"
                            id="cart-dot" style="display: none;"></span>
                    </button>
                    <button onclick="toggleTheme()"
                        class="p-2 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
                        <span class="material-symbols-outlined theme-toggle-icon">dark_mode</span>
                    </button>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-8 space-y-6">
                <!-- Page Title -->
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>
                        <h2 class="text-3xl font-extrabold tracking-tight" id="page-title">Catálogo</h2>
                        <p class="text-slate-500 dark:text-slate-400">Explora nuestra colección de productos modernos.
                        </p>
                    </div>
                </div>

                <!-- Product Grid Container -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="product-grid">
                    <!-- Products will be loaded here via app.js -->
                    <div class="animate-pulse flex flex-col gap-4">
                        <div class="bg-slate-200 h-64 rounded-xl"></div>
                        <div class="h-4 bg-slate-200 rounded w-3/4"></div>
                        <div class="h-4 bg-slate-200 rounded w-1/2"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js?v=8"></script>
    <script src="js/app.js?v=8"></script>
</body>

</html>
