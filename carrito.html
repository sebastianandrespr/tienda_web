<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Tu Carrito - ShopModern</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <div class="relative flex min-h-screen flex-col overflow-x-hidden">
        <header
            class="sticky top-0 z-50 w-full border-b border-slate-200 dark:border-slate-800 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="flex h-16 items-center justify-between gap-8">
                    <div class="flex items-center gap-2" onclick="location.href='index.html'" style="cursor: pointer;">
                        <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary text-white">
                            <span class="material-symbols-outlined text-xl">shopping_bag</span>
                        </div>
                        <h2 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">ShopModern</h2>
                    </div>
                    <nav class="flex items-center gap-4 lg:gap-8">
                        <div class="hidden lg:flex items-center gap-6">
                            <a class="text-sm font-medium hover:text-primary transition-colors"
                                href="index.html">Inicio</a>
                            <a class="text-sm font-medium hover:text-primary transition-colors" href="#">Categorías</a>
                        </div>
                        <div
                            class="flex items-center gap-2 border-l border-slate-200 dark:border-slate-800 pl-4 lg:pl-8">
                            <button
                                class="relative rounded-xl p-2 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                                <span class="material-symbols-outlined">person</span>
                            </button>
                        </div>
                    </nav>
                </div>
            </div>
        </header>

        <main class="mx-auto w-full max-w-7xl flex-1 px-4 py-8 sm:px-6 lg:px-8">
            <nav class="mb-6 flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400">
                <a class="hover:text-primary" href="index.html">Inicio</a>
                <span class="material-symbols-outlined text-xs">chevron_right</span>
                <span class="text-slate-900 dark:text-white font-medium">Carrito de Compras</span>
            </nav>
            <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white mb-8">Tu Carrito</h1>

            <div class="grid grid-cols-1 gap-x-8 gap-y-10 lg:grid-cols-12" id="cart-content">
                <!-- Cart Items Section -->
                <div class="lg:col-span-8">
                    <div
                        class="flow-root rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50">
                        <ul class="-my-6 divide-y divide-slate-200 dark:divide-slate-800 px-6" id="cart-items-list">
                            <!-- Items via carrito.js -->
                        </ul>
                    </div>
                </div>

                <!-- Order Summary Section -->
                <div class="lg:col-span-4">
                    <div
                        class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 p-6 shadow-sm">
                        <h2 class="text-lg font-bold text-slate-900 dark:text-white">Resumen del Pedido</h2>
                        <div class="mt-6 space-y-4">
                            <div class="flex items-center justify-between">
                                <p class="text-sm text-slate-600 dark:text-slate-400">Subtotal</p>
                                <p class="text-sm font-semibold text-slate-900 dark:text-white" id="summary-subtotal">
                                    $0.00</p>
                            </div>
                            <div
                                class="flex items-center justify-between border-t border-slate-100 dark:border-slate-800 pt-4">
                                <p class="text-sm text-slate-600 dark:text-slate-400">Envío Estimado</p>
                                <p class="text-sm font-semibold text-slate-900 dark:text-white">$5.00</p>
                            </div>
                            <div
                                class="flex items-center justify-between border-t border-slate-200 dark:border-slate-700 pt-4">
                                <p class="text-base font-bold text-slate-900 dark:text-white">Total</p>
                                <p class="text-base font-bold text-slate-900 dark:text-white" id="summary-total">$0.00
                                </p>
                            </div>
                        </div>
                        <div class="mt-8">
                            <button
                                class="w-full flex items-center justify-center rounded-xl bg-primary px-6 py-4 text-base font-bold text-white shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all active:scale-[0.98]">
                                Finalizar Compra
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="empty-cart-message" style="display: none;" class="text-center py-20">
                <span class="material-symbols-outlined text-6xl text-slate-300">shopping_cart_off</span>
                <h2 class="text-xl font-bold mt-4">Tu carrito está vacío</h2>
                <a href="index.html" class="inline-block mt-4 btn-primary">Volver a la tienda</a>
            </div>
        </main>
    </div>

    <script src="js/carrito.js"></script>
</body>

</html>
