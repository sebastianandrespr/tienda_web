<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Iniciar Sesión - MiTienda</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/theme.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
        <header
            class="flex items-center justify-between whitespace-nowrap border-b border-slate-200 dark:border-slate-800 px-6 md:px-20 py-4 bg-white dark:bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
            <div class="flex items-center gap-3" onclick="location.href='index.html'" style="cursor: pointer;">
                <div class="text-primary">
                    <span class="material-symbols-outlined text-3xl">shopping_bag</span>
                </div>
                <h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">MiTienda</h2>
            </div>
            <nav class="hidden md:flex gap-8">
                <a class="text-slate-600 dark:text-slate-300 text-sm font-medium hover:text-primary transition-colors"
                    href="index.html">Tienda</a>
                <a class="text-slate-600 dark:text-slate-300 text-sm font-medium hover:text-primary transition-colors"
                    href="registro.html">Registrarse</a>
                <button onclick="toggleTheme()"
                    class="p-2 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
                    <span class="material-symbols-outlined theme-toggle-icon">dark_mode</span>
                </button>
            </nav>
        </header>

        <main
            class="flex-1 flex items-center justify-center p-6 bg-gradient-to-br from-slate-50 to-slate-100 dark:from-background-dark dark:to-slate-900">
            <div class="w-full max-w-md">
                <div
                    class="bg-white dark:bg-slate-800 shadow-2xl rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700">
                    <div class="p-8 md:p-10">
                        <div class="text-center mb-8">
                            <h1 class="text-slate-900 dark:text-white text-3xl font-bold tracking-tight mb-2">Bienvenido
                            </h1>
                            <p class="text-slate-500 dark:text-slate-400 text-sm">Ingresa tus credenciales para acceder
                                a tu cuenta.</p>
                        </div>
                        <form class="space-y-5" id="login-form">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2"
                                    for="email">Correo Electrónico</label>
                                <div class="relative group">
                                    <div
                                        class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                                        <span class="material-symbols-outlined text-[20px]">mail</span>
                                    </div>
                                    <input
                                        class="block w-full pl-10 pr-3 py-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm"
                                        id="email" name="email" placeholder="usuario@ejemplo.com" required
                                        type="email" />
                                </div>
                            </div>
                            <div>
                                <div class="flex items-center justify-between mb-2">
                                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300"
                                        for="password">Teléfono (Contraseña)</label>
                                </div>
                                <div class="relative group">
                                    <div
                                        class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                                        <span class="material-symbols-outlined text-[20px]">phone</span>
                                    </div>
                                    <input
                                        class="block w-full pl-10 pr-12 py-3 border border-slate-300 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm"
                                        id="password" name="password" placeholder="+57 --- --- ----" required
                                        type="tel" />
                                </div>
                            </div>
                            <button
                                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all transform active:scale-[0.98]"
                                type="submit">
                                Iniciar Sesión
                            </button>
                            <div id="login-message" class="text-center text-sm"></div>
                        </form>
                    </div>
                    <div
                        class="px-8 py-6 bg-slate-50 dark:bg-slate-900/50 border-t border-slate-200 dark:border-slate-700 text-center">
                        <p class="text-sm text-slate-600 dark:text-slate-400">
                            ¿No tienes una cuenta?
                            <a class="font-bold text-primary hover:text-primary/80 transition-colors"
                                href="registro.html">Crea una cuenta</a>
                        </p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="js/api.js?v=5"></script>
    <script src="js/login.js?v=5"></script>
</body>

</html>
